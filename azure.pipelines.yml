trigger:
  - main

pool:
  vmImage: ubuntu-latest

stages:
  - stage: CI
    jobs:
      - job: Front
        steps:
          - checkout: self
          - task: NodeTool@0
            inputs:
              versionSpec: '22.x'

          - script: npm ci
            workingDirectory: AnimGestionFront

          - script: npm run lint
            workingDirectory: AnimGestionFront

          - script: npm run test:run
            workingDirectory: AnimGestionFront

          - script: npm run build
            workingDirectory: AnimGestionFront

      - job: Back
        steps:
          - checkout: self
          - task: NodeTool@0
            inputs:
              versionSpec: '22.x'

          - script: npm ci
            workingDirectory: AnimGestionBack

          - script: npm run lint
            workingDirectory: AnimGestionBack

          - script: npm run test
            workingDirectory: AnimGestionBack

          - script: npm run build
            workingDirectory: AnimGestionBack